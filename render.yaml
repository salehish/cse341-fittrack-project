# Render Blueprint for the FitTrack API.
# In the Render dashboard: New + > Blueprint, connect this repo, and Render
# reads this file. Set MONGO_URI as a secret when prompted (sync: false).
services:
  - type: web
    name: fittrack-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGO_URI
        sync: false
      # GitHub OAuth — set these as secrets in the Render dashboard.
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      # Full callback URL so it matches the GitHub OAuth App registration.
      - key: GITHUB_CALLBACK_URL
        value: https://cse341-fittrack-project.onrender.com/auth/github/callback
