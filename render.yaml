# Render Blueprint for the FitTrack API.
# In the Render dashboard: New + > Blueprint, connect this repo, and Render
# reads this file. Set MONGO_URI as a secret when prompted (sync: false).
services:
  - type: web
    name: fittrack-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGO_URI
        sync: false
